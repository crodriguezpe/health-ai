<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Health AI</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Health AI">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
</head>
<body>
<header>
<h1>Health AI</h1>
<p>Your Personal Health Dashboard</p>
</header>
<div class="grid">
<div class="card">
<div class="label">
Health Age
</div>
<div id="healthAge"
class="value health">
49
</div>
<div class="unit">
years
</div>
</div>
<div class="card">
<div class="label">
Readiness
</div>
<div id="readiness"
class="value readiness">
82
</div>
<div class="unit">
%
</div>
</div>
<div class="card">
<div class="label">
Sleep Score
</div>
<div id="sleepScore"
class="value sleep">
86
</div>
<div class="unit">
%
</div>
</div>
<div class="card">
<div class="label">
Activity
</div>
<div id="activityScore"
class="value activity">
71
</div>
<div class="unit">
%
</div>
</div>
<div class="card large">
<h2 class="sectionTitle">
Health Age Trend
</h2>
<canvas
id="healthChart"
width="900"
height="260">
</canvas>
</div>
<div class="card large">
<div class="card large">

<h2 class="sectionTitle">

Today's Metrics

</h2>

<div class="metricGrid">

<label>👣 Steps</label>
<input id="stepsInput" type="number" value="4000">

<label>😴 Sleep (hours)</label>
<input id="sleepInput" type="number" step="0.1" value="6.5">

<label>❤️ Resting HR</label>
<input id="hrInput" type="number" value="60">

<label>🧠 HRV</label>
<input id="hrvInput" type="number" value="40">

<label>⚖️ Weight (kg)</label>
<input id="weightInput" type="number" step="0.1" value="85">

<label>💪 Muscle Mass (kg)</label>
<input id="muscleInput" type="number" step="0.1" value="38">

<label>🫃 Body Fat (%)</label>
<input id="fatInput" type="number" step="0.1" value="20">

</div>

</div>
  <h2 class="sectionTitle">
Today's AI Coach
</h2>
<div id="coach">
Loading...
</div>
<button
id="analyzeButton">
Analyze Today
</button>
</div>
</div>
<div class="spacer"></div>
<div class="bottomNav">
<div class="active">
🏠
<br>
Dashboard
</div>
<div>
📈
<br>
History
</div>
<div>
🏃
<br>
Workout
</div>
<div>
⚙️
<br>
Settings
</div>
</div>
<script src="charts.js"></script>
<script src="storage.js"></script>
<script src="app.js"></script>
</body>
</html>
